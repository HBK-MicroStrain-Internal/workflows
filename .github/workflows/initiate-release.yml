name: 'Create a Release Branch and PR'

on:
  workflow_call:
    inputs:
      version:
        description: 'Version of the release'
        type: string
        required: true

    secrets:
      app_id:
        description: 'GitHub App ID for releases'
        required: true

      app_private_key:
        description: 'GitHub App private key for releases'
        required: true

jobs:
  workflow:
    name: 'Create GitHub Release'
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout'
        uses: HBK-MicroStrain-Internal/actions/checkout@main
        with:
          ref: develop

      - name: "Verify Release Version"
        id: verify-version
        shell: bash
        run: |
          release_version="${{ inputs.version }}"

          if [[ ! "${release_version}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "❌ Invalid version format: '${release_version}'. Expected format: 1.2.3 or 1.2.3.4 (optional leading v)"
            exit 1
          fi

          # Make sure the version is prepended with a v
          [[ "${release_version}" != v* ]] && release_version="v${release_version}"

          echo "release_version=${release_version}" >> $GITHUB_OUTPUT

      - name: 'Generate GitHub App Token'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}

      - name: "Get Previous Release Version"
        id: previous-version
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          # Get the previous semantic release from GitHub
          # Excludes drafts (by default) and pre-releases
          previous_release=$(gh release list --limit 1 --exclude-pre-releases --json tagName --jq '.[0].tagName')

          # Default to 0.0.0 for no existing releases
          previous_release=${previous_release:-0.0.0}

          echo "previous_release=$previous_release" >> $GITHUB_OUTPUT

      - name: "Compare Versions"
        if: >-
          ${{
            steps.project-version.outcome == 'success'
          }}
        id: compare-version
        uses: HBK-MicroStrain-Internal/actions/version-compare@main
        with:
          version_lhs: "${{ steps.verify-version.outputs.release_version }}"
          version_rhs: "${{ steps.previous-version.outputs.previous_release }}"
          greater: true

      - name: 'Display Version Error'
        if: >-
          ${{
            steps.compare-version.outcome == 'failure'
          }}
        shell: bash
        run: |
          echo "❌ ERROR: Cannot create release. Input version ${{ steps.verify-version.outputs.release_version }} has not been incremented from the previous release ${{ steps.previous-version.outputs.previous_release }}"
          exit 1

      - name: 'Create the release branch'
        shell: bash
        run: |
          # Create the release branch
          git checkout -b release/${{ steps.verify-version.outputs.release_version }}

      - name: 'Update CMake project version'
        shell: bash
        run: |
          # Update the version in the root CMakeLists.txt
          new_version="${{ steps.verify-version.outputs.release_version }}"

          # Remove the prepended v
          new_version="${new_version#v}"

          # Update the CMakeLists.txt
          sed -i "/project(/,/)/s/\(VERSION[[:space:]]\+\)[0-9]\+\.[0-9]\+\.[0-9]\+/\1${new_version}/" CMakeLists.txt

          # Verify the version was updated
          updated=$(sed -n '/project(/,/)/p' CMakeLists.txt |
            grep -oEi 'VERSION[[:space:]]+[0-9]+\.[0-9]+\.[0-9]+' |
            grep -oEi '[0-9]+\.[0-9]+\.[0-9]+')

          if [[ "${updated}" != "${new_version}" ]]; then
            echo "❌ ERROR: Version update failed! Got: ${updated}"
            exit 1
          fi

          echo "Version successfully updated to ${updated}"

      - name: 'Commit and Push Release Branch'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Configure the Action Bot as the git user
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Commit the updated CMake project version change
          git add CMakeLists.txt
          git commit -m "Bump version to ${{ steps.verify-version.outputs.release_version }} for release"

          # Push the new release branch
          git push origin release/${{ steps.verify-version.outputs.release_version }}

      - name: 'Extract Release Notes'
        id: extract-notes
        uses: ffurrer2/extract-release-notes@v2
        with:
          changelog_file: CHANGELOG.md

      - name: 'Create Release Pull Request'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr create \
            --base main \
            --head release/${{ steps.verify-version.outputs.release_version }} \
            --title "Release ${{ steps.verify-version.outputs.release_version }}" \
            --body "${{ steps.extract-notes.outputs.release_notes }}"

      - name: 'Cleanup Release Branch on Failure'
        if: failure()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          remote_branch="release/${{ steps.verify-version.outputs.release_version }}"

          # Check if the new branch was created and pushed
          if git ls-remote --exit-code origin ${remote_branch} > /dev/null 2>&1; then
            # Delete the remote branch since the workflow failed
            git push origin --delete ${remote_branch}
            echo "Cleaned up ${remote_branch} branch"
          fi
