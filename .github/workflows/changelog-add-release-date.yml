name: 'Add Release Date To Changelog'

on:
  workflow_call:

jobs:
  add-changelog-release-date:
    name: 'Add Release Date To Changelog'
    runs-on: ubuntu-latest
    steps:
      - name: 'Get Checkbox State'
        id: checkbox-state
        uses: HBK-MicroStrain-Internal/actions/pull-request-checkbox-checked@main
        with:
          checkbox_label: ${{ vars.RELEASE_CHANGELOG_CHECKBOX_MESSAGE }}

      - name: 'Checkout'
        if: >-
          ${{
            steps.checkbox-state.outputs.is_checked == 'true'
          }}
        uses: HBK-MicroStrain-Internal/actions/checkout@main
        with:
          fetch-depth: 1

      - name: 'Get Release Version'
        id: release-version
        if: >-
          ${{
            steps.checkbox-state.outputs.is_checked == 'true'
          }}
        uses: HBK-MicroStrain-Internal/actions/cmake-project-version@main

      - name: 'Update Changelog Date'
        if: >-
          ${{
            steps.checkbox-state.outputs.is_checked == 'true'
          }}
        uses: thomaseizinger/keep-a-changelog-new-release@3.1.0
        with:
          version: 'v${{ steps.release-version.outputs.version }}'
