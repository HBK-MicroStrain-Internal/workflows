name: 'Add Release Date To Changelog'

on:
  workflow_call:
    secrets:
      app_id:
        description: 'GitHub App ID for releases'
        required: true

      app_private_key:
        description: 'GitHub App private key for releases'
        required: true

jobs:
  add-changelog-release-date:
    name: 'Add Release Date To Changelog'
    runs-on: ubuntu-latest
    steps:
      - name: 'Get Checkbox State'
        id: checkbox-state
        uses: HBK-MicroStrain-Internal/actions/pull-request-checkbox-checked@main
        with:
          checkbox_label: ${{ vars.RELEASE_CHANGELOG_CHECKBOX_MESSAGE }}

      - name: 'Checkout'
        if: >-
          ${{
            steps.checkbox-state.outputs.is_checked == 'true'
          }}
        uses: HBK-MicroStrain-Internal/actions/checkout@main
        with:
          fetch-depth: 1

      - name: 'Get Release Version'
        id: release-version
        if: >-
          ${{
            steps.checkbox-state.outputs.is_checked == 'true'
          }}
        uses: HBK-MicroStrain-Internal/actions/cmake-project-version@main

      - name: 'Update Changelog Date'
        if: >-
          ${{
            steps.checkbox-state.outputs.is_checked == 'true'
          }}
        uses: thomaseizinger/keep-a-changelog-new-release@3.1.0
        with:
          version: v${{ steps.release-version.outputs.version }}

      - name: 'Generate GitHub App Token'
        id: app-token
        if: >-
          ${{
            steps.checkbox-state.outputs.is_checked == 'true'
          }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}

      - name: 'Commit And Push Changelog Update'
        if: >-
          ${{
            steps.checkbox-state.outputs.is_checked == 'true'
          }}
        uses: statens-pensjonskasse/gha-create-signed-commit@v0.1.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          message: "Update changelog for release v${{ steps.release-version.outputs.version }}"
          paths: |
            CHANGELOG.md
          push: true
          fail-on-no-changes: false
